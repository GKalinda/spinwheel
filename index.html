<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta - Tiradas Gratis</title>
<style>
  /* --- Fondo y Entorno Visual --- */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    overflow-x: hidden;
    
    background: 
      linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%),
      radial-gradient(circle at 70% 30%, rgba(117, 143, 255, 0.05) 0%, rgba(117, 143, 255, 0) 50%),
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.01) 10px, rgba(0,0,0,0.01) 20px);
    background-attachment: fixed;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: -1; 
  }

  body::before {
    width: 500px;
    height: 500px;
    background: rgba(117, 143, 255, 0.03);
    top: -150px;
    left: -150px;
  }

  body::after {
    width: 400px;
    height: 400px;
    background: rgba(46, 213, 115, 0.03);
    bottom: -100px;
    right: -100px;
  }

  /* --- Botón Menú Hamburguesa --- */
  #btn-menu {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    z-index: 100;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #2f3542;
  }

  #btn-menu:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  }

  #overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 999;
  }

  #overlay.activo {
    opacity: 1;
    pointer-events: auto;
  }

  /* --- Contenedor Principal --- */
  .contenedor-ruleta {
    background: white;
    padding: 50px 60px; 
    border-radius: 25px; 
    box-shadow: 0 15px 45px rgba(0,0,0,0.06); 
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  /* --- Ruleta Visual --- */
  .flecha {
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 30px solid #ff4757;
    margin: 0 auto -12px; 
    position: relative;
    z-index: 10;
    filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.2));
  }

  .ruleta-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }

  #canvas {
    border-radius: 50%;
    cursor: pointer;
    display: block;
    width: 380px;  
    height: 380px; 
  }

  .ruleta-container::after {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    background: radial-gradient(circle at top left, #ffffff 0%, #ced6e0 70%, #a4b0be 100%);
    border: 3px solid #ced6e0;
    border-radius: 50%;
    z-index: 5;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 2px 5px rgba(0,0,0,0.3);
  }

  /* --- Botones y Resultados --- */
  #girarBtn {
    background: linear-gradient(135deg, #758fff, #9c7eff);
    border: none;
    padding: 18px 40px;
    color: white;
    font-size: 19px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(117, 143, 255, 0.3);
    transition: all 0.3s ease;
    margin-top: 35px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #girarBtn:not(:disabled):hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 25px rgba(117, 143, 255, 0.5);
  }

  #girarBtn:disabled {
    background: #ced6e0;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  #resultado {
    background: #f1f2f6; 
    border: 1px solid #ced6e0; 
    border-radius: 12px;
    padding: 15px 25px; 
    margin-top: 30px; 
    font-size: 20px;
    font-weight: bold;
    min-height: 28px;
    color: #2f3542;
    transition: all 0.3s ease;
    width: 80%; 
    box-sizing: border-box;
  }

  @keyframes parpadear {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  
  .resultado-perdonado {
    color: #2ed573 !important;
    border-color: #2ed573 !important;
    background: rgba(46, 213, 115, 0.05) !important;
    transform: scale(1.05);
    animation: parpadear 1s ease-in-out infinite;
    box-shadow: 0 0 15px rgba(46, 213, 115, 0.2);
  }

  .resultado-reintentar {
    color: #758fff !important;
    border-color: #758fff !important;
    background: rgba(117, 143, 255, 0.05) !important;
    transform: scale(1.05);
    font-style: italic;
    box-shadow: 0 0 15px rgba(117, 143, 255, 0.2);
  }

  /* --- Panel de Configuración Deslizante --- */
  .panel-configuracion {
    position: fixed;
    top: 0;
    right: -350px; 
    width: 320px;
    height: 100vh; 
    background: white;
    box-shadow: -5px 0 25px rgba(0,0,0,0.15);
    z-index: 1000; 
    transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    padding: 25px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .panel-configuracion.abierto {
    right: 0; 
  }

  .header-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    border-bottom: 2px solid #f1f2f6;
    padding-bottom: 10px;
  }

  .header-panel h3 {
    margin: 0;
    font-size: 20px;
    color: #2f3542;
  }

  .btn-cerrar-panel {
    background: transparent;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: #ff4757;
    line-height: 1;
    padding: 0 5px;
    transition: transform 0.2s;
  }

  .btn-cerrar-panel:hover {
    transform: scale(1.2);
  }

  #lista-opciones {
    list-style: none;
    padding: 0;
    margin: 0 0 15px 0;
    overflow-y: auto; 
    flex-grow: 1; 
    scrollbar-width: thin;
    scrollbar-color: #ced6e0 transparent;
  }

  #lista-opciones::-webkit-scrollbar { width: 6px; }
  #lista-opciones::-webkit-scrollbar-thumb { background-color: #ced6e0; border-radius: 10px; }

  .item-opcion {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
    padding-right: 5px; 
  }

  .item-opcion input {
    flex-grow: 1;
    padding: 10px;
    border: 1px solid #ced6e0;
    border-radius: 6px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .item-opcion input:focus {
    border-color: #758fff;
  }

  .btn-eliminar {
    background: #ff4757;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
  }

  .btn-añadir {
    background: #2ed573;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    margin-top: auto; 
    transition: transform 0.2s;
  }
  
  .btn-añadir:hover {
    transform: translateY(-2px);
  }
  
  @media (max-width: 500px) {
    .contenedor-ruleta { padding: 30px 20px; width: 100%; border-radius: 15px; }
    #canvas { width: 100%; max-width: 380px; height: auto; aspect-ratio: 1/1; }
    .panel-configuracion { width: 100%; right: -100%; }
    #resultado { width: 100%; font-size: 18px; }
  }
</style>
</head>
<body>

<button id="btn-menu" onclick="toggleMenu()">☰</button>
<div id="overlay" onclick="toggleMenu()"></div>

<div class="contenedor-ruleta">
  <div class="flecha"></div>
  <div class="ruleta-container">
    <canvas id="canvas" width="380" height="380"></canvas>
  </div>
  <button id="girarBtn" onclick="girarRuleta()">Girar Ruleta</button>
  <div id="resultado">¡Prueba tu suerte!</div>
</div>

<div class="panel-configuracion" id="panel-config">
  <div class="header-panel">
    <h3>⚙️ Opciones</h3>
    <button class="btn-cerrar-panel" onclick="toggleMenu()">×</button>
  </div>
  <ul id="lista-opciones"></ul>
  <button class="btn-añadir" onclick="añadirOpcion()">+ Añadir opción</button>
</div>

<script>
function toggleMenu() {
  const panel = document.getElementById('panel-config');
  const overlay = document.getElementById('overlay');
  
  panel.classList.toggle('abierto');
  overlay.classList.toggle('activo');
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const resultado = document.getElementById("resultado");
const girarBtn = document.getElementById("girarBtn");
const listaOpcionesUI = document.getElementById("lista-opciones");

let ruletaGirando = false;
let rotacionActual = 0;

// Opciones actualizadas con montos entre 200 y 700
let opciones = [
  "200€", "Perdonado", "400€", "550€", "250€", "600€", 
  "300€", "Vuelve a tirar", "450€", "700€", "350€", "500€"
];

const colores = [
  "#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff",
  "#bdb2ff", "#ffc6ff", "#fffffc", "#d0f4de", "#f1cbff", "#ffb3c6"
];

function ajustarColor(color, cantidad) {
  let r = parseInt(color.slice(1, 3), 16), g = parseInt(color.slice(3, 5), 16), b = parseInt(color.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + cantidad));
  g = Math.max(0, Math.min(255, g + cantidad));
  b = Math.max(0, Math.min(255, b + cantidad));
  return `rgb(${r}, ${g}, ${b})`;
}

function dibujarRuleta() {
  const slices = opciones.length;
  if (slices === 0) return;
  ctx.clearRect(0, 0, 380, 380);
  
  const centro = 190; 
  
  for (let i = 0; i < slices; i++) {
    ctx.beginPath();
    ctx.moveTo(centro, centro);
    const gradient = ctx.createRadialGradient(centro, centro, 0, centro, centro, centro);
    gradient.addColorStop(0, colores[i % colores.length]); 
    gradient.addColorStop(1, ajustarColor(colores[i % colores.length], -20)); 
    ctx.fillStyle = gradient;
    ctx.arc(centro, centro, centro, (i * 2 * Math.PI) / slices, ((i + 1) * 2 * Math.PI) / slices);
    ctx.fill();
    
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(0,0,0,0.05)";
    ctx.stroke();
    
    ctx.save();
    ctx.translate(centro, centro);
    ctx.rotate(((i + 0.5) * 2 * Math.PI) / slices);
    ctx.fillStyle = "#2f3542";
    
    const fontSize = slices > 15 ? 12 : 16;
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(opciones[i], centro - 20, 0);
    ctx.restore();
  }
}

function girarRuleta() {
  if (ruletaGirando || opciones.length === 0) return;
  ruletaGirando = true;
  girarBtn.disabled = true;
  resultado.className = "";
  resultado.innerText = "Girando...";

  const slices = opciones.length;
  const indiceGanador = Math.floor(Math.random() * slices);
  const vueltasExtras = (Math.floor(Math.random() * 4) + 5) * 360;
  
  const sliceAngle = 360 / slices;
  const anguloCentroPremio = (indiceGanador * sliceAngle) + (sliceAngle / 2);
  const desfaseAleatorio = (Math.random() * (sliceAngle * 0.8)) - (sliceAngle * 0.4);
  const baseRotacion = 270 - anguloCentroPremio + desfaseAleatorio;

  const moduloActual = rotacionActual % 360;
  let diferenciaRotacion = baseRotacion - moduloActual;
  if (diferenciaRotacion < 0) diferenciaRotacion += 360;

  const rotacionTotal = rotacionActual + vueltasExtras + diferenciaRotacion;
  
  canvas.style.transition = "transform 4s cubic-bezier(0.2, 0.8, 0.1, 1)";
  canvas.style.transform = `rotate(${rotacionTotal}deg)`;
  rotacionActual = rotacionTotal;

  setTimeout(() => {
    const textoGanador = opciones[indiceGanador];
    
    if (textoGanador.toLowerCase().includes("perdonado")) {
      resultado.innerText = "¡Has sido perdonado! 🎉";
      resultado.classList.add("resultado-perdonado");
    } else if (textoGanador.toLowerCase().includes("vuelve a tirar") || textoGanador.toLowerCase().includes("otra vez")) {
      resultado.innerText = "¡Tira de nuevo! 🔄";
      resultado.classList.add("resultado-reintentar");
      setTimeout(() => { if(!ruletaGirando) resultado.innerText += " (¡Tu turno!)"; }, 1500);
    } else {
      resultado.innerText = `Resultado: ${textoGanador}`;
    }
    
    ruletaGirando = false;
    girarBtn.disabled = false;
  }, 4050); 
}

function renderizarLista() {
  listaOpcionesUI.innerHTML = "";
  opciones.forEach((opcion, index) => {
    const li = document.createElement("li");
    li.className = "item-opcion";
    li.innerHTML = `<input type="text" value="${opcion}" oninput="opciones[${index}]=this.value; dibujarRuleta()">
                    <button class="btn-eliminar" onclick="eliminarOpcion(${index})">×</button>`;
    listaOpcionesUI.appendChild(li);
  });
  dibujarRuleta();
}

function eliminarOpcion(index) {
  if (opciones.length > 2) { opciones.splice(index, 1); renderizarLista(); }
  else { alert("La ruleta necesita al menos 2 opciones."); }
}

function añadirOpcion() {
  opciones.push("Nueva");
  renderizarLista();
  listaOpcionesUI.scrollTop = listaOpcionesUI.scrollHeight;
}

renderizarLista();
canvas.addEventListener('click', () => {
  if (!ruletaGirando) girarRuleta();
});

// --- PROTECCIÓN BÁSICA ---
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) e.preventDefault();
});
</script>
</body>
</html>
