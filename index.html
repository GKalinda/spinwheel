<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta - Tiradas Gratis</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: radial-gradient(circle at center, #ffffff 0%, #f0f2f5 100%);
    margin: 0;
    flex-direction: column;
  }

  .contenedor-principal {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
  }

  .flecha {
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 35px solid #ff4757;
    margin: 0 auto -15px; 
    position: relative;
    z-index: 10;
    filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.2));
  }

  .ruleta-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    background: #2f3542;
    border-radius: 50%;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
  }

  #canvas {
    border-radius: 50%;
    cursor: pointer;
    display: block;
  }

  /* Centro de la ruleta (Pivote 3D) */
  .ruleta-container::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    background: radial-gradient(circle at top left, #ffffff 0%, #ced6e0 70%, #a4b0be 100%);
    border: 3px solid #ced6e0;
    border-radius: 50%;
    z-index: 5;
    box-shadow: 
      inset 0 1px 3px rgba(0,0,0,0.4),
      0 2px 5px rgba(0,0,0,0.4),
      0 4px 10px rgba(0,0,0,0.2);
  }

  /* --- Botón girar --- */
  #girarBtn {
    background: linear-gradient(135deg, #758fff, #9c7eff);
    border: none;
    padding: 15px 35px;
    color: white;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(117, 143, 255, 0.4);
    transition: all 0.3s ease;
    margin-top: 30px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #girarBtn:not(:disabled):hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 6px 20px rgba(117, 143, 255, 0.6);
  }

  #girarBtn:disabled {
    background: #ced6e0;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  #resultado {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    min-height: 30px;
    text-align: center;
    color: #2f3542;
    transition: all 0.3s ease;
  }
  
  /* Animaciones de resultados especiales */
  @keyframes parpadear {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  
  .resultado-perdonado {
    color: #2ed573 !important;
    transform: scale(1.1);
    animation: parpadear 1s ease-in-out infinite;
    text-shadow: 0 0 5px rgba(46, 213, 115, 0.3);
  }

  .resultado-reintentar {
    color: #758fff !important;
    transform: scale(1.1);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="contenedor-principal">
  <div class="flecha"></div>
  <div class="ruleta-container">
    <canvas id="canvas" width="400" height="400"></canvas>
  </div>
  <button id="girarBtn" onclick="girarRuleta()">Girar Ruleta</button>
  <div id="resultado">¡Prueba tu suerte!</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const resultado = document.getElementById("resultado");
const girarBtn = document.getElementById("girarBtn");

let ruletaGirando = false;
let rotacionActual = 0;

const opciones = [
  { texto: "5€", mensaje: "Debes 5€" },
  { texto: "Perdonado", mensaje: "¡Perdonado! 🎉" },
  { texto: "150€", mensaje: "Debes 150€" },
  { texto: "200€", mensaje: "Debes 200€" },
  { texto: "20€", mensaje: "Debes 20€" },
  { texto: "100€", mensaje: "Debes 100€" },
  { texto: "80€", mensaje: "Debes 80€" },
  { texto: "Vuelve a tirar", mensaje: "¡Tira de nuevo! 🔄" },
  { texto: "350€", mensaje: "Debes 350€" },
  { texto: "300€", mensaje: "Debes 300€" },
  { texto: "50€", mensaje: "Debes 50€" },
  { texto: "250€", mensaje: "Debes 250€" }
];

const colores = [
  "#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff",
  "#bdb2ff", "#ffc6ff", "#fffffc", "#d0f4de", "#f1cbff", "#ffb3c6"
];

const slices = opciones.length;
const sliceAngle = 360 / slices;

// Función para oscurecer colores y crear el efecto de degradado
function ajustarColor(color, cantidad) {
  let r, g, b;
  if (color.startsWith('#')) {
    r = parseInt(color.slice(1, 3), 16);
    g = parseInt(color.slice(3, 5), 16);
    b = parseInt(color.slice(5, 7), 16);
  } else {
    r = g = b = 128; // Color por defecto si falla
  }
  r = Math.max(0, Math.min(255, r + cantidad));
  g = Math.max(0, Math.min(255, g + cantidad));
  b = Math.max(0, Math.min(255, b + cantidad));
  return `rgb(${r}, ${g}, ${b})`;
}

function dibujarRuleta() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const centroX = canvas.width / 2;
  const centroY = canvas.height / 2;
  const radio = centroX;

  for (let i = 0; i < slices; i++) {
    ctx.beginPath();
    ctx.moveTo(centroX, centroY);
    
    // Aplicar el degradado radial a cada porción
    const gradient = ctx.createRadialGradient(centroX, centroY, 0, centroX, centroY, radio);
    gradient.addColorStop(0, colores[i % colores.length]); 
    gradient.addColorStop(1, ajustarColor(colores[i % colores.length], -20)); 

    ctx.fillStyle = gradient;
    ctx.arc(centroX, centroY, radio, (i * 2 * Math.PI) / slices, ((i + 1) * 2 * Math.PI) / slices);
    ctx.fill();

    // Línea separadora sutil para darle mejor acabado
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(0,0,0,0.05)";
    ctx.stroke();

    // Dibujar el texto
    ctx.save();
    ctx.translate(centroX, centroY);
    ctx.rotate(((i + 0.5) * 2 * Math.PI) / slices);
    ctx.fillStyle = "#2f3542";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(opciones[i].texto, radio - 20, 0);
    ctx.restore();
  }
}

dibujarRuleta();

function girarRuleta() {
  if (ruletaGirando) return;

  ruletaGirando = true;
  girarBtn.disabled = true;
  resultado.className = ""; // Limpiar clases de animaciones anteriores
  resultado.innerText = "Girando...";

  const indiceGanador = Math.floor(Math.random() * slices);
  const vueltasExtras = (Math.floor(Math.random() * 4) + 5) * 360;
  const anguloCentroPremio = (indiceGanador * sliceAngle) + (sliceAngle / 2);
  const desfaseAleatorio = (Math.random() * (sliceAngle * 0.8)) - (sliceAngle * 0.4);
  const baseRotacion = 270 - anguloCentroPremio + desfaseAleatorio;

  const moduloActual = rotacionActual % 360;
  let diferenciaRotacion = baseRotacion - moduloActual;
  if (diferenciaRotacion < 0) diferenciaRotacion += 360; 

  const rotacionFinal = rotacionActual + vueltasExtras + diferenciaRotacion;

  // Curva de animación (empieza rápido, termina muy suave)
  canvas.style.transition = "transform 4s cubic-bezier(0.2, 0.8, 0.1, 1)";
  canvas.style.transform = `rotate(${rotacionFinal}deg)`;

  rotacionActual = rotacionFinal;

  setTimeout(() => {
    const opcion = opciones[indiceGanador];
    resultado.innerText = opcion.mensaje;

    // Aplicar estilos especiales según el premio que haya salido
    if (opcion.texto === "Perdonado") {
      resultado.classList.add("resultado-perdonado");
    } else if (opcion.texto === "Vuelve a tirar") {
      resultado.classList.add("resultado-reintentar");
      
      // Mensaje de feedback tras un momento
      setTimeout(() => {
        if(!ruletaGirando) resultado.innerText += " (¡Tu turno!)";
      }, 1500);
    }

    ruletaGirando = false;
    girarBtn.disabled = false;
  }, 4050); // Tiempo alineado con la duración de la transición CSS + 50ms de margen
}

// Permitir que el click en la rueda también active el giro
canvas.addEventListener('click', () => {
  if (!ruletaGirando) girarRuleta();
});
</script>
</body>
</html>
