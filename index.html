<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta Compacta - Tiradas Gratis</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: radial-gradient(circle at center, #ffffff 0%, #f0f2f5 100%);
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
  }

  /* --- Diseño Principal Compacto --- */
  .layout-principal {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1000px;
    width: 100%;
  }

  .contenedor-ruleta {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 1 auto; /* No se expande innecesariamente */
  }

  /* --- Ruleta Visual Redimensionada --- */
  .flecha {
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 25px solid #ff4757;
    margin: 0 auto -10px; 
    position: relative;
    z-index: 10;
    filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.2));
  }

  .ruleta-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  #canvas {
    border-radius: 50%;
    cursor: pointer;
    display: block;
    width: 300px; /* Tamaño reducido */
    height: 300px;
  }

  /* Pivote 3D */
  .ruleta-container::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    background: radial-gradient(circle at top left, #ffffff 0%, #ced6e0 70%, #a4b0be 100%);
    border: 2px solid #ced6e0;
    border-radius: 50%;
    z-index: 5;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
  }

  /* --- Botones y Resultados --- */
  #girarBtn {
    background: linear-gradient(135deg, #758fff, #9c7eff);
    border: none;
    padding: 12px 28px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(117, 143, 255, 0.3);
    transition: all 0.3s ease;
    margin-top: 25px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #girarBtn:not(:disabled):hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(117, 143, 255, 0.5);
  }

  #resultado {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    min-height: 24px;
    color: #2f3542;
  }

  /* --- Panel de Configuración con Scroll --- */
  .panel-configuracion {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 280px; /* Más estrecho */
    max-height: 520px; /* Altura máxima fija para todo el panel */
    display: flex;
    flex-direction: column;
  }

  .panel-configuracion h3 {
    margin: 0 0 15px 0;
    font-size: 18px;
    color: #2f3542;
    text-align: center;
    border-bottom: 2px solid #f1f2f6;
    padding-bottom: 10px;
  }

  #lista-opciones {
    list-style: none;
    padding: 0;
    margin: 0 0 15px 0;
    overflow-y: auto; /* Scroll habilitado */
    flex-grow: 1; /* Ocupa el espacio disponible */
    max-height: 300px; /* Altura máxima de la lista antes de hacer scroll */
    scrollbar-width: thin;
    scrollbar-color: #ced6e0 transparent;
  }

  #lista-opciones::-webkit-scrollbar { width: 5px; }
  #lista-opciones::-webkit-scrollbar-thumb { background-color: #ced6e0; border-radius: 10px; }

  .item-opcion {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
    padding-right: 5px; /* Espacio para el scroll */
  }

  .item-opcion input {
    flex-grow: 1;
    padding: 8px 10px;
    border: 1px solid #ced6e0;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }

  .btn-eliminar {
    background: #ff4757;
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .btn-añadir {
    background: #2ed573;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
  }

  /* Ajustes Móviles */
  @media (max-width: 700px) {
    .contenedor-ruleta, .panel-configuracion { width: 100%; min-width: unset; }
  }
</style>
</head>
<body>

<div class="layout-principal">
  
  <div class="contenedor-ruleta">
    <div class="flecha"></div>
    <div class="ruleta-container">
      <canvas id="canvas" width="300" height="300"></canvas>
    </div>
    <button id="girarBtn" onclick="girarRuleta()">Girar Ruleta</button>
    <div id="resultado">¡Suerte!</div>
  </div>

  <div class="panel-configuracion">
    <h3>⚙️ Opciones</h3>
    <ul id="lista-opciones"></ul>
    <button class="btn-añadir" onclick="añadirOpcion()">+ Añadir opción</button>
  </div>

</div>

<script>
// --- LÓGICA DE LA RULETA ---
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const resultado = document.getElementById("resultado");
const girarBtn = document.getElementById("girarBtn");
const listaOpcionesUI = document.getElementById("lista-opciones");

let ruletaGirando = false;
let rotacionActual = 0;

let opciones = ["5€", "Perdonado", "150€", "20€", "100€", "Vuelve a tirar", "50€", "250€"];
const colores = ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff"];

function ajustarColor(color, cantidad) {
  let r = parseInt(color.slice(1, 3), 16), g = parseInt(color.slice(3, 5), 16), b = parseInt(color.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + cantidad));
  g = Math.max(0, Math.min(255, g + cantidad));
  b = Math.max(0, Math.min(255, b + cantidad));
  return `rgb(${r}, ${g}, ${b})`;
}

function dibujarRuleta() {
  const slices = opciones.length;
  if (slices === 0) return;
  ctx.clearRect(0, 0, 300, 300);
  for (let i = 0; i < slices; i++) {
    ctx.beginPath();
    ctx.moveTo(150, 150);
    const gradient = ctx.createRadialGradient(150, 150, 0, 150, 150, 150);
    gradient.addColorStop(0, colores[i % colores.length]); 
    gradient.addColorStop(1, ajustarColor(colores[i % colores.length], -20)); 
    ctx.fillStyle = gradient;
    ctx.arc(150, 150, 150, (i * 2 * Math.PI) / slices, ((i + 1) * 2 * Math.PI) / slices);
    ctx.fill();
    ctx.save();
    ctx.translate(150, 150);
    ctx.rotate(((i + 0.5) * 2 * Math.PI) / slices);
    ctx.fillStyle = "#2f3542";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(opciones[i], 135, 5);
    ctx.restore();
  }
}

function girarRuleta() {
  if (ruletaGirando || opciones.length === 0) return;
  ruletaGirando = true;
  girarBtn.disabled = true;
  resultado.innerText = "Girando...";

  const slices = opciones.length;
  const indiceGanador = Math.floor(Math.random() * slices);
  const vueltasExtras = (Math.floor(Math.random() * 4) + 5) * 360;
  const anguloFinal = 270 - ((indiceGanador * 360 / slices) + (180 / slices));

  const rotacionTotal = rotacionActual + vueltasExtras + (anguloFinal - (rotacionActual % 360) + 360) % 360;
  canvas.style.transition = "transform 4s cubic-bezier(0.2, 0.8, 0.1, 1)";
  canvas.style.transform = `rotate(${rotacionTotal}deg)`;
  rotacionActual = rotacionTotal;

  setTimeout(() => {
    resultado.innerText = `Resultado: ${opciones[indiceGanador]}`;
    ruletaGirando = false;
    girarBtn.disabled = false;
  }, 4050); 
}

function renderizarLista() {
  listaOpcionesUI.innerHTML = "";
  opciones.forEach((opcion, index) => {
    const li = document.createElement("li");
    li.className = "item-opcion";
    li.innerHTML = `<input type="text" value="${opcion}" oninput="opciones[${index}]=this.value; dibujarRuleta()">
                    <button class="btn-eliminar" onclick="eliminarOpcion(${index})">×</button>`;
    listaOpcionesUI.appendChild(li);
  });
  dibujarRuleta();
}

function eliminarOpcion(index) {
  if (opciones.length > 2) { opciones.splice(index, 1); renderizarLista(); }
}

function añadirOpcion() {
  opciones.push("Nuevo");
  renderizarLista();
  listaOpcionesUI.scrollTop = listaOpcionesUI.scrollHeight;
}

renderizarLista();

// --- PROTECCIÓN ---
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) e.preventDefault();
});
</script>
</body>
</html>
