<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta - Tiradas Gratis</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: radial-gradient(circle at center, #ffffff 0%, #f0f2f5 100%);
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
  }

  .layout-principal {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1200px;
    width: 100%;
  }

  .contenedor-ruleta {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flecha {
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 35px solid #ff4757;
    margin: 0 auto -15px; 
    position: relative;
    z-index: 10;
    filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.2));
  }

  .ruleta-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    /* Borde negro eliminado, reemplazado por una sombra suave */
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  #canvas {
    border-radius: 50%;
    cursor: pointer;
    display: block;
  }

  /* Centro de la ruleta (Pivote 3D) */
  .ruleta-container::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    background: radial-gradient(circle at top left, #ffffff 0%, #ced6e0 70%, #a4b0be 100%);
    border: 3px solid #ced6e0;
    border-radius: 50%;
    z-index: 5;
    box-shadow: 
      inset 0 1px 3px rgba(0,0,0,0.4),
      0 2px 5px rgba(0,0,0,0.4),
      0 4px 10px rgba(0,0,0,0.2);
  }

  /* --- Botón girar --- */
  #girarBtn {
    background: linear-gradient(135deg, #758fff, #9c7eff);
    border: none;
    padding: 15px 35px;
    color: white;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(117, 143, 255, 0.4);
    transition: all 0.3s ease;
    margin-top: 30px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #girarBtn:not(:disabled):hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 6px 20px rgba(117, 143, 255, 0.6);
  }

  #girarBtn:disabled {
    background: #ced6e0;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  #resultado {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    min-height: 30px;
    text-align: center;
    color: #2f3542;
    transition: all 0.3s ease;
  }

  /* Animaciones */
  @keyframes parpadear {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  
  .resultado-perdonado {
    color: #2ed573 !important;
    transform: scale(1.1);
    animation: parpadear 1s ease-in-out infinite;
    text-shadow: 0 0 5px rgba(46, 213, 115, 0.3);
  }

  .resultado-reintentar {
    color: #758fff !important;
    transform: scale(1.1);
    font-style: italic;
  }

  /* --- Panel de Configuración --- */
  .panel-configuracion {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 300px;
    max-height: 600px;
    display: flex;
    flex-direction: column;
  }

  .panel-configuracion h3 {
    margin-top: 0;
    color: #2f3542;
    border-bottom: 2px solid #f1f2f6;
    padding-bottom: 10px;
  }

  #lista-opciones {
    list-style: none;
    padding: 0;
    margin: 0 0 20px 0;
    overflow-y: auto;
    flex-grow: 1;
  }

  .item-opcion {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }

  .item-opcion input {
    flex-grow: 1;
    padding: 10px;
    border: 1px solid #ced6e0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .item-opcion input:focus {
    border-color: #758fff;
  }

  .btn-eliminar {
    background: #ff4757;
    color: white;
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }

  .btn-eliminar:hover {
    background: #ff6b81;
  }

  .btn-añadir {
    background: #2ed573;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: all 0.2s;
  }

  .btn-añadir:hover {
    background: #26de81;
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="layout-principal">
  
  <div class="contenedor-ruleta">
    <div class="flecha"></div>
    <div class="ruleta-container">
      <canvas id="canvas" width="400" height="400"></canvas>
    </div>
    <button id="girarBtn" onclick="girarRuleta()">Girar Ruleta</button>
    <div id="resultado">¡Prueba tu suerte!</div>
  </div>

  <div class="panel-configuracion">
    <h3>Editar Opciones</h3>
    <ul id="lista-opciones">
      </ul>
    <button class="btn-añadir" onclick="añadirOpcion()">+ Añadir nueva opción</button>
  </div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const resultado = document.getElementById("resultado");
const girarBtn = document.getElementById("girarBtn");
const listaOpcionesUI = document.getElementById("lista-opciones");

let ruletaGirando = false;
let rotacionActual = 0;

// Arreglo dinámico de opciones
let opciones = [
  "5€", "Perdonado", "150€", "200€", "20€", "100€", 
  "80€", "Vuelve a tirar", "350€", "300€", "50€", "250€"
];

const colores = [
  "#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff",
  "#bdb2ff", "#ffc6ff", "#fffffc", "#d0f4de", "#f1cbff", "#ffb3c6"
];

// Función para oscurecer colores y crear el efecto de degradado
function ajustarColor(color, cantidad) {
  let r, g, b;
  if (color.startsWith('#')) {
    r = parseInt(color.slice(1, 3), 16);
    g = parseInt(color.slice(3, 5), 16);
    b = parseInt(color.slice(5, 7), 16);
  } else {
    r = g = b = 128;
  }
  r = Math.max(0, Math.min(255, r + cantidad));
  g = Math.max(0, Math.min(255, g + cantidad));
  b = Math.max(0, Math.min(255, b + cantidad));
  return `rgb(${r}, ${g}, ${b})`;
}

// DIBUJAR LA RULETA
function dibujarRuleta() {
  const slices = opciones.length;
  if (slices === 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }

  const sliceAngle = 360 / slices;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const centroX = canvas.width / 2;
  const centroY = canvas.height / 2;
  const radio = centroX;

  for (let i = 0; i < slices; i++) {
    ctx.beginPath();
    ctx.moveTo(centroX, centroY);
    
    const gradient = ctx.createRadialGradient(centroX, centroY, 0, centroX, centroY, radio);
    gradient.addColorStop(0, colores[i % colores.length]); 
    gradient.addColorStop(1, ajustarColor(colores[i % colores.length], -20)); 

    ctx.fillStyle = gradient;
    ctx.arc(centroX, centroY, radio, (i * 2 * Math.PI) / slices, ((i + 1) * 2 * Math.PI) / slices);
    ctx.fill();

    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(0,0,0,0.05)";
    ctx.stroke();

    ctx.save();
    ctx.translate(centroX, centroY);
    ctx.rotate(((i + 0.5) * 2 * Math.PI) / slices);
    ctx.fillStyle = "#2f3542";
    
    // Ajustar el tamaño del texto si hay muchas opciones
    const fontSize = slices > 15 ? 14 : 18;
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(opciones[i], radio - 20, 0);
    ctx.restore();
  }
}

// GIRAR LA RULETA
function girarRuleta() {
  if (ruletaGirando || opciones.length === 0) return;

  ruletaGirando = true;
  girarBtn.disabled = true;
  resultado.className = ""; 
  resultado.innerText = "Girando...";

  const slices = opciones.length;
  const sliceAngle = 360 / slices;

  const indiceGanador = Math.floor(Math.random() * slices);
  const vueltasExtras = (Math.floor(Math.random() * 4) + 5) * 360;
  const anguloCentroPremio = (indiceGanador * sliceAngle) + (sliceAngle / 2);
  const desfaseAleatorio = (Math.random() * (sliceAngle * 0.8)) - (sliceAngle * 0.4);
  const baseRotacion = 270 - anguloCentroPremio + desfaseAleatorio;

  const moduloActual = rotacionActual % 360;
  let diferenciaRotacion = baseRotacion - moduloActual;
  if (diferenciaRotacion < 0) diferenciaRotacion += 360; 

  const rotacionFinal = rotacionActual + vueltasExtras + diferenciaRotacion;

  canvas.style.transition = "transform 4s cubic-bezier(0.2, 0.8, 0.1, 1)";
  canvas.style.transform = `rotate(${rotacionFinal}deg)`;

  rotacionActual = rotacionFinal;

  setTimeout(() => {
    const textoGanador = opciones[indiceGanador];
    
    // Configurar el mensaje final
    if (textoGanador.toLowerCase().includes("perdonado")) {
      resultado.innerText = "¡Has sido perdonado! 🎉";
      resultado.classList.add("resultado-perdonado");
    } else if (textoGanador.toLowerCase().includes("vuelve a tirar")) {
      resultado.innerText = "¡Tira de nuevo! 🔄";
      resultado.classList.add("resultado-reintentar");
      setTimeout(() => { if(!ruletaGirando) resultado.innerText += " (¡Tu turno!)"; }, 1500);
    } else {
      resultado.innerText = `Resultado: ${textoGanador}`;
    }

    ruletaGirando = false;
    girarBtn.disabled = false;
  }, 4050); 
}

// --- LÓGICA DEL PANEL DE CONFIGURACIÓN ---

function renderizarLista() {
  listaOpcionesUI.innerHTML = "";
  opciones.forEach((opcion, index) => {
    const li = document.createElement("li");
    li.className = "item-opcion";
    
    const input = document.createElement("input");
    input.type = "text";
    input.value = opcion;
    input.oninput = (e) => actualizarOpcion(index, e.target.value);
    
    const btnEliminar = document.createElement("button");
    btnEliminar.className = "btn-eliminar";
    btnEliminar.innerText = "X";
    btnEliminar.onclick = () => eliminarOpcion(index);
    
    li.appendChild(input);
    li.appendChild(btnEliminar);
    listaOpcionesUI.appendChild(li);
  });
  dibujarRuleta();
}

function actualizarOpcion(index, nuevoValor) {
  opciones[index] = nuevoValor;
  dibujarRuleta(); // Redibuja en tiempo real
}

function eliminarOpcion(index) {
  if (opciones.length <= 2) {
    alert("La ruleta necesita al menos 2 opciones.");
    return;
  }
  opciones.splice(index, 1);
  renderizarLista();
}

function añadirOpcion() {
  opciones.push("Nueva Opción");
  renderizarLista();
  // Scroll hacia abajo para ver la nueva opción
  listaOpcionesUI.scrollTop = listaOpcionesUI.scrollHeight;
}

// Inicializar
renderizarLista();

canvas.addEventListener('click', () => {
  if (!ruletaGirando) girarRuleta();
});
</script>
</body>
</html>
