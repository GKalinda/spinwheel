<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button id="btn-menu" aria-label="Abrir opciones" onclick="toggleMenu()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 5H18M2 10H18M2 15H18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
</button>
<div id="overlay" onclick="toggleMenu()"></div>

<main class="contenedor-ruleta">

  <header class="cabecera">
    <span class="eyebrow">Ruleta de premios</span>
    <h1>Gira y descubre tu resultado</h1>
  </header>

  <div class="flecha" aria-hidden="true"></div>
  <div class="ruleta-container">
    <canvas id="canvas" width="380" height="380" role="img" aria-label="Ruleta de premios"></canvas>
  </div>

  <button id="girarBtn" onclick="girarRuleta()">Girar ruleta</button>
  <div id="resultado" role="status" aria-live="polite">Gira cuando quieras</div>

  <!-- Enlace de apoyo, totalmente opcional: siempre el mismo, no depende
       del resultado de la ruleta, y nunca bloquea ni condiciona volver a girar. -->
  <button id="btn-pagar" class="btn-pagar" hidden>
    Ver mi lista de deseos <span class="opcional">· si te apetece</span>
  </button>

</main>

<aside class="panel-configuracion" id="panel-config" aria-hidden="true">
  <div class="header-panel">
    <h3>Opciones de la ruleta</h3>
    <button class="btn-cerrar-panel" aria-label="Cerrar" onclick="toggleMenu()">×</button>
  </div>
  <ul id="lista-opciones"></ul>
  <button class="btn-añadir" onclick="añadirOpcion()">+ Añadir opción</button>
</aside>

<script src="script.js"></script>
</body>
</html>
